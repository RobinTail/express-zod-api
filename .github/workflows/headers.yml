name: Headers update

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0" # Runs every Sunday at midnight UTC

permissions:
  id-token: none
  contents: write # Grants write access to push changes
  pull-requests: write # and create PRs
  models: read # Access to GitHub Models API for header classification

jobs:
  run-bash-and-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: fregante/setup-git-user@v2
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Check for new headers on IANA.ORG
        run: pnpm node tools/headers.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for changes
        id: git-state
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create branch, commit, and push changes
        id: create-branch
        if: steps.git-state.outputs.changes == 'true'
        run: |
          BRANCH_NAME="headers-update-$(date +%Y%m%d%H%M%S)"
          echo "branch-name=$BRANCH_NAME" >> $GITHUB_OUTPUT

      - name: Create a pull request
        if: steps.git-state.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          base: ${{ github.ref_name }}
          branch: ${{ steps.create-branch.outputs.branch-name }}
          commit-message: "Changed well-known headers"
          title: "Well-known headers update"
          body: "Automated updates to well-known HTTP headers. New headers classified via GitHub Models API (GPT-4.1). Response-only headers moved to `tools/response-only-headers.ts`."
          delete-branch: false
